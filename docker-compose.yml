services:
  mongodb:
    image: mongo:4.4.18
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env          # อ่านจาก .env — ไม่เขียน secret ไว้ที่นี่
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/personal-dev-tracker
      - NODE_ENV=development
      - ALLOWED_ORIGIN=http://localhost:3000
    depends_on:
      mongodb:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      # ให้เป็น localhost เพราะ browser ของ user จะเป็นคนยิง request ไปหา backend
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    depends_on:
      - backend

volumes:
  mongo_data:
